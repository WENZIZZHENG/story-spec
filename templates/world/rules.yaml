worldFacts:
  - id: world.example.rule
    title: 示例世界规则
    type: rule
    summary: 用一句话说明会影响剧情的世界规则。
    storyFunction: 说明它如何限制角色选择、制造冲突或推动剧情。
    constraints:
      - 写作时必须遵守的限制。
    pressure: 说明这条规则如何在场景中压迫、诱惑或改变角色行动。
    beneficiaries:
      - 因这条规则获利或维持权力的人/势力。
    costs:
      - 因这条规则付出代价或被排除的人/势力。
    violationConsequence: 角色违反这条规则会发生什么。
    sceneEvidencePaths:
      - stories/[story]/scenes/scene-001.yaml
    sourcePaths:
      - spec/knowledge/world-setting.md
    source:
      confirmedByUser: false
      aiSuggested: false
      needsClarification: []
    status: draft
