id: write
title: 章节写作
stage: drafting
description: 基于任务清单执行章节写作
arguments:
  hint: "[章节编号或任务ID]"
requiredReads:
  - .specify/agent-contract.md
  - .specify/memory/constitution.md
  - .specify/memory/author-profile.json
  - stories/*/specification.md
  - stories/*/creative-plan.md
  - stories/*/tasks.md
  - spec/tracking/*.json
  - spec/world/*.yaml
  - spec/canon/*.json
  - spec/graph/*.json
  - spec/voice/**
  - stories/*/scenes/*.yaml
  - spec/knowledge/*
allowedWrites:
  - stories/*/tasks.md
  - stories/*/content/**
  - spec/tracking/**
  - spec/canon/propagation-debt.json
  - spec/graph/indexes.json
scripts:
  check:
    capability: check-writing-state
    sh: .specify/scripts/bash/check-writing-state.sh
    ps: .specify/scripts/powershell/check-writing-state.ps1
risk:
  requiresTaskBoundary: true
  highRiskContentPolicy: use-task-boundary
