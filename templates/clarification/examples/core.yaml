id: core
name: 通用示例分叉
description: 适用于所有小说项目的基础示例分叉。
keywords:
  - 小说
  - 创意
  - 主角
  - 舞台
  - 文风
branches:
  - label: 作者主导：继续提问
    tone: 保留创作空间
    assumptions:
      - 先不决定主角身份。
      - 先不决定结局和感情对象。
    sampleAnswer: 我先不定主角，请继续问我 3 个关键问题。
    tradeoffs:
      - 推进速度较慢，但不会让 AI 替作者定稿。
      - 适合还在找方向的探索阶段。
  - label: 轻松冒险版
    tone: 轻松、明快
    assumptions:
      - 第一卷从边境小城的小异常开始。
      - 重点先放在冒险和关系推进。
    sampleAnswer: 主角先把异界法术当调试问题，靠小冒险慢慢认识这个世界。
    tradeoffs:
      - 开局亲和力高，但文明级威胁要后置。
      - 轻松感强，早期张力更温和。
  - label: 硬规则推演版
    tone: 规则清晰、偏推演
    assumptions:
      - 编程施法有语法、运行时和错误类型。
      - 每次施法都要承担明确代价。
    sampleAnswer: 我想让法术像可调试程序，但第一卷只展示三条规则。
    tradeoffs:
      - 逻辑感强，但术语密度要控制。
      - 更适合喜欢拆规则的读者。
