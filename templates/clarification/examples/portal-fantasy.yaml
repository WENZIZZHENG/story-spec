id: portal-fantasy
name: 异界穿越示例分叉
description: 处理穿越机制、回家动机和文明差异的示例分叉。
keywords:
  - 异界
  - 穿越
  - 回家
  - 文明差异
branches:
  - label: 作者主导：先不定穿越细节
    tone: 作者主导、探索优先
    assumptions:
      - 穿越原因暂时不公开。
      - 先把第一卷的生活节奏立住。
    sampleAnswer: 先别替我定穿越方式，我想先把主角怎么适应异界写清楚。
    tradeoffs:
      - 保留悬念，但开局信息更少。
      - 适合慢热推进。
  - label: 被召唤而来
    tone: 关系驱动
    assumptions:
      - 主角不是主动穿越。
      - 召唤者本身也不完全懂异界规则。
    sampleAnswer: 主角是被一次失败召唤拉来的，开局就被卷进别人的问题里。
    tradeoffs:
      - 关系起点明确，但主角自主性要写得更强。
      - 方便把世界冲突和人物关系绑在一起。
  - label: 事故穿越版
    tone: 日常感强
    assumptions:
      - 穿越发生在一次工作或调试事故里。
      - 主角会把新世界先当成待排障环境。
    sampleAnswer: 主角在排查异常日志时穿越了，第一反应是先找问题源头。
    tradeoffs:
      - 和编程施法天然衔接，但要避免太工程化。
      - 开局更贴近“从熟悉到陌生”的体验。
