id: cozy-adventure
name: 轻松冒险示例分叉
description: 处理轻松冒险节奏和局部任务感的示例分叉。
keywords:
  - 轻松
  - 冒险
  - 小镇
  - 旅程
branches:
  - label: 作者主导：继续提问
    tone: 保留创作空间
    assumptions:
      - 先不决定具体任务结构。
      - 先把轻松感的来源留给用户确认。
    sampleAnswer: 我先不定具体任务结构，请继续问我 3 个关键问题。
    tradeoffs:
      - 能保留创作空间，但开局更需要互动。
      - 适合还在找第一卷节奏的时候。
  - label: 轻松任务流
    tone: 节奏明快
    assumptions:
      - 每一卷都围绕一个局部目标。
      - 小问题会逐步指向大危机。
    sampleAnswer: 第一卷先解决固定据点里的日常异常，再慢慢碰到更大的威胁。
    tradeoffs:
      - 易读，但需要稳定的单元结构。
      - 大危机必须有层次感。
  - label: 旅程见闻版
    tone: 开阔、流动
    assumptions:
      - 通过路途接触不同地区。
      - 每站都能推进一点世界认知。
    sampleAnswer: 主角一路旅行，一站解决一个问题，同时拼出世界真相。
    tradeoffs:
      - 世界观展开自然，但人物关系要更主动。
      - 适合边走边揭示。
  - label: 伙伴互损版
    tone: 轻松吐槽
    assumptions:
      - 队伍内部有足够的口头互动。
      - 轻松感主要来自关系。
    sampleAnswer: 小队一边互损一边处理异常，危险在，但气氛不压抑。
    tradeoffs:
      - 读起来有温度，但要避免油滑。
      - 需要清楚每个角色的声音。
