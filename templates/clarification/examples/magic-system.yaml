id: magic-system
name: 编程施法示例分叉
description: 处理法术硬度、失败代价和规则表达方式的示例分叉。
keywords:
  - 编程施法
  - 规则
  - 法术
  - 错误
  - 调试
branches:
  - label: 作者主导：继续提问
    tone: 保留创作空间
    assumptions:
      - 先不把编程施法的最终规则定死。
      - 先让用户决定硬度和表达方式。
    sampleAnswer: 我先不定规则硬度，请继续问我 3 个关键问题。
    tradeoffs:
      - 能保住创作空间，但推进会慢一点。
      - 适合还在比较规则硬度的时候。
  - label: 硬规则推演版
    tone: 逻辑明确
    assumptions:
      - 法术可以像程序一样调试。
      - 错误类型会直接决定剧情事故。
    sampleAnswer: 我希望法术有语法、运行时和错误日志，但不要写成纯技术文档。
    tradeoffs:
      - 设定更有辨识度，但解释负担更高。
      - 读者需要接受一定的规则学习。
  - label: 轻量隐喻版
    tone: 更轻快
    assumptions:
      - 编程只是理解魔法的比喻。
      - 重点是“好用”，不是“讲完所有原理”。
    sampleAnswer: 编程只当作主角理解法术的方式，不需要把每个细节都写成代码。
    tradeoffs:
      - 轻松顺滑，但技术辨识度会变弱。
      - 更适合节奏优先的故事。
  - label: 事故驱动版
    tone: 喜剧感、解决问题
    assumptions:
      - 每次施法都可能出一类可描述的错误。
      - 失败本身能推动小单元冒险。
    sampleAnswer: 法术错误越多，主角越需要像调 bug 一样推进剧情。
    tradeoffs:
      - 事件性强，但需要控制重复感。
      - 适合轻松冒险。
