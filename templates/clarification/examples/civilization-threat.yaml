id: civilization-threat
name: 文明级威胁示例分叉
description: 处理文明级危机、威胁露出和长线张力的示例分叉。
keywords:
  - 文明
  - 威胁
  - 危机
  - 旧文明
  - 灾难
branches:
  - label: 作者主导：先别定最终威胁
    tone: 保留悬念
    assumptions:
      - 最终威胁暂时不公开。
      - 先从小异常和局部事故写起。
    sampleAnswer: 先别替我定文明级威胁的真相，我想让它从异常里慢慢露出来。
    tradeoffs:
      - 更利于长线悬念，但前期信息更少。
      - 需要靠层层发现推进。
  - label: 旧文明重启版
    tone: 史诗感
    assumptions:
      - 异界背后有一套沉睡的旧系统。
      - 当前社会只是它的局部运行结果。
    sampleAnswer: 威胁来自旧文明系统即将重启，日常异常只是前兆。
    tradeoffs:
      - 氛围宏大，但要控制早期解释量。
      - 很容易压过轻松冒险，需要慢慢露出。
  - label: 资源枯竭版
    tone: 更现实
    assumptions:
      - 危机来自资源、秩序和认知的长期失衡。
      - 改造社会不是口号，而是必须面对的代价。
    sampleAnswer: 文明级威胁表现为资源和秩序一点点失衡，主角只能边冒险边修补。
    tradeoffs:
      - 更贴近建设流，但要防止变成纯种田。
      - 适合慢热、层层推进的写法。
