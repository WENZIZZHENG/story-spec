id: core
name: 通用创作澄清
description: 适用于所有小说项目的基础创作决策。
keywords:
  - 小说
  - 创意
  - 主角
  - 舞台
  - 文风
questions:
  - id: core.premise
    stage: specify
    topic: premise
    question: 这本小说最想保留的一句话核心创意是什么？
    whyItMatters: 核心创意是作者控制权的边界，后续规格不能替你改掉它。
    type: textarea
    required: true
    exampleAnswers:
      - 一个退休导航员在边境驿站接待迷路旅客，故事先从轻松治愈的小单元开始。
      - 主角不急着拯救世界，而是逐步理解这个地方为什么需要被留下来。
      - 宏大背景只是推动角色相遇的暗线，重点仍是日常选择、关系和秘密揭示。
    exampleBranches:
      - label: 轻松单元入口
        answer: 第一卷先写小范围事件和角色相遇，长线秘密只露出细小裂缝。
        flavor: 开局亲和、轻快，让读者先喜欢这个地方和这群人。
        tradeoffs:
          - 长线危机揭示会慢一些。
          - 需要让每个小单元本身也有清楚回报。
        downstreamImpact: 阅读承诺偏轻松和陪伴感，成长路线从解决具体小问题开始。
        recommendedFor:
          - 慢热开局
          - 想先体验故事地点的魅力
      - label: 长线谜团入口
        answer: 开局的温和事件都隐约指向一段被遗忘的历史，主角从局部线索追到真相。
        flavor: 悬疑感更强，轻松感来自角色处理异常时的温度和聪明。
        tradeoffs:
          - 大设定更早出现，需要控制解释密度。
          - 每个单元要持续留下可回收线索。
        downstreamImpact: 阅读承诺会更偏谜团揭示；每卷需要设计阶段性揭示和回报。
        recommendedFor:
          - 喜欢长线伏笔
          - 想让历史秘密更早牵引主线
      - label: 关系共创入口
        answer: 核心创意是主角用自己的经验理解陌生处境，同时被伙伴逼着理解人和选择。
        flavor: 角色情感和价值碰撞更突出，能力爽点服务关系推进。
        tradeoffs:
          - 爽点不只来自变强，还来自互相改变。
          - 需要尽早设计核心伙伴的立场和反驳能力。
        downstreamImpact: 慢热感情和伙伴线会成为成长路线的一部分。
        recommendedFor:
          - 慢热感情
          - 想让伙伴有真实功能
  - id: core.protagonist
    stage: specify
    topic: protagonist
    question: 主角开局最重要的性格缺口或能力盲区是什么？
    whyItMatters: 缺口决定成长线，也能避免主角一开始就替故事解决所有问题。
    type: text
    required: true
    exampleAnswers:
      - 他擅长处理复杂局面，却不擅长承认自己也需要被照顾。
      - 她判断冷静、行动谨慎，必须靠伙伴把旧经验变成新的现场选择。
      - 他习惯用过去的规则解释一切，早期会低估这个地方的人情和伤痕。
    exampleBranches:
      - label: 旧经验误判
        answer: 主角擅长用过去经验拆解问题，却常误以为别人的选择也能被同一套规则解释。
        flavor: 幽默来自认真但偏差的分析，成长来自学会尊重人的复杂性。
        tradeoffs:
          - 主角不会一开始就通吃社交和制度问题。
          - 需要安排伙伴纠偏，避免主角显得冷漠。
        downstreamImpact: 主角成长线会围绕“理解问题”到“理解人和关系”展开。
        recommendedFor:
          - 成熟但有盲区的主角
          - 慢热关系线
      - label: 行动短板
        answer: 主角复盘能力很强，但第一次进入真正危险现场会慢半拍。
        flavor: 冒险感更强，伙伴能自然承担现场判断和保护功能。
        tradeoffs:
          - 前期爽点会更慢热。
          - 需要给主角清楚的学习回报。
        downstreamImpact: 核心伙伴更容易成为刚需，第一卷成长路线更扎实。
        recommendedFor:
          - 小队冒险
          - 想避免主角开局无敌
      - label: 快捷处理后遗症
        answer: 主角喜欢用最快方式救急，但捷径会把后续关系或环境变成麻烦。
        flavor: 小事故带喜剧感，也能制造有后果的小冲突。
        tradeoffs:
          - 需要控制事故重复感。
          - 主角要逐步建立更负责任的行动边界。
        downstreamImpact: 失败代价会直接推动成长路线。
        recommendedFor:
          - 轻松冒险
          - 事故喜剧
  - id: core.stage
    stage: specify
    topic: setting
    question: 故事第一卷主要发生在哪类舞台？
    whyItMatters: 舞台会限制冒险单元、关系进展和文明威胁的露出速度。
    type: single-choice
    required: false
    options:
      - value: home-base
        label: 固定据点
        description: 适合轻松单元和慢慢揭示大危机。
      - value: workplace
        label: 学习或工作场所
        description: 适合展示规则学习、同伴关系和专业体系。
      - value: route
        label: 旅途路线
        description: 适合单元冒险和不断接触新世界碎片。
    exampleAnswers:
      - 固定据点，问题看似很小，但每个来客都带来一段未解的过去。
      - 学习或工作场所，主角先被当成外来者，慢慢暴露自己的独特价值。
      - 旅途路线，每站解决一个局部问题，同时积累世界真相。
    exampleBranches:
      - label: 固定据点
        answer: 第一卷围绕一个固定据点展开，日常小故障和来客故事逐步露出大问题。
        flavor: 生活感和陪伴感强，大威胁从普通人的麻烦里露头。
        tradeoffs:
          - 舞台规模小，需要让地方利益结构足够鲜明。
          - 主角影响力增长更慢但更可信。
        downstreamImpact: 世界压力来自资源、责任、秘密和小异常的连锁后果。
        recommendedFor:
          - 轻松冒险
          - 慢慢揭示长线秘密
      - label: 专业场所
        answer: 第一卷在一个专业场所，技能、资质和职责边界会成为主要摩擦。
        flavor: 规则学习、同伴关系和制度冲突更集中。
        tradeoffs:
          - 容易偏内部日常，需要安排外部事件打破封闭感。
          - 知识垄断要有合理性，而不只是反派坏。
        downstreamImpact: 势力冲突会围绕知识垄断、专利、资格审查展开。
        recommendedFor:
          - 专业成长线
          - 想让制度压力早期登场
      - label: 旅队路线
        answer: 第一卷跟随旅队移动，每一站解决一个异常，也见到不同阶层如何承受旧规则。
        flavor: 像旅行见闻，世界广度展开更快。
        tradeoffs:
          - 关系沉淀较难，需要固定小队核心。
          - 单元冒险要有共同主线线索。
        downstreamImpact: 文明威胁揭示会更碎片化，适合每站留下一个系统线索。
        recommendedFor:
          - 单元冒险
          - 展示文明差异
  - id: core.partner
    stage: specify
    topic: partner
    question: 核心伙伴或早期关系线最重要的功能是什么？
    whyItMatters: 伙伴不是奖励角色，而是挑战主角、补足现场判断或制造价值冲突的人。
    type: textarea
    required: false
    exampleAnswers:
      - 伙伴熟悉本地规则，也敢质疑主角用旧经验解释一切的傲慢。
      - 伙伴负责把主角的解决方案拖回普通人的生计、情绪和法律后果。
      - 伙伴来自秩序内部，既能打开资源门，也会让主角看见制度的合理性。
    exampleBranches:
      - label: 受挫的本地专家
        answer: 核心伙伴是被主流体系排挤过的本地专家，懂传统规则，也被资格制度伤过。
        flavor: 学习线和情感线都更近，互相质疑、互相翻译。
        tradeoffs:
          - 容易自然接入制度冲突。
          - 需要避免伙伴只负责解释设定。
        downstreamImpact: 能力体系和关系升温会绑定；伙伴能指出主角不理解本地语境的地方。
        recommendedFor:
          - 专业场所
          - 慢热感情
      - label: 现场责任人
        answer: 核心伙伴是现场责任人，关心普通人的安全，不允许主角只看方案正确。
        flavor: 冒险现场感强，价值冲突直接落到人命、秩序和责任。
        tradeoffs:
          - 感情升温更慢，但信任建立会更有重量。
          - 需要让伙伴有自己的判断和失败。
        downstreamImpact: 世界压力会从普通人处境展开，成功路线更重视信任和公共后果。
        recommendedFor:
          - 固定据点
          - 轻松中带真实压力
      - label: 秩序内部人
        answer: 核心伙伴来自现有秩序内部，既享受制度保护，也知道内部正在腐烂。
        flavor: 阶层张力更强，关系线会夹在利益和理解之间。
        tradeoffs:
          - 势力冲突更复杂。
          - 需要避免把内部人写成单纯赎罪工具。
        downstreamImpact: 势力与冲突会更早进入主线，思想改造有具体关系承载。
        recommendedFor:
          - 制度内部冲突
          - 想写制度内部视角
  - id: core.faction-conflict
    stage: specify
    topic: faction
    question: 第一卷最先撞上的势力或冲突是什么？
    whyItMatters: 冲突要有利益逻辑，才能让世界观像真实社会，而不是只有坏人阻拦。
    type: textarea
    required: false
    choiceImpact: high
    exampleAnswers:
      - 管理机构垄断关键许可，担心主角的方法打破资格体系。
      - 地方掌权者把异常压下去，因为公开会影响生计、秩序和利益。
      - 守护组织把异常称为禁忌，既保护群众，也遮蔽真相。
    exampleBranches:
      - label: 许可体系
        answer: 管理机构垄断关键许可，主角的新方法会削弱证书、署名和资源分配的权威。
        flavor: 知识垄断和规则学习同台出现，冲突理性但压迫感清楚。
        tradeoffs:
          - 需要写出管理者维护秩序的合理性。
          - 容易偏制度讨论，要用具体冒险保持动感。
        downstreamImpact: 成功路线会围绕“验证方法-争取信任-突破许可”推进。
        recommendedFor:
          - 专业场所
          - 规则学习线
        interestingChoice:
          appeal: 知识垄断和规则学习同台出现，新方法会立刻撞上制度边界。
          cost: 容易偏制度讨论，需要用事故救援和小队行动保持冒险动感。
          relationshipImpact: 伙伴若来自体系内部，会同时带来本地知识和违规风险。
          worldImpact: 许可、证书和署名会把规则变成日常压迫，而不只是背景设定。
          futureHook: 下一轮最该确认主角第一次越权救人时，谁获利、谁背锅。
          confirmationBoundary: 候选势力结构，确认后才写入 World Bible、specification 或 conflict plan。
        powerStructure:
          name: 许可管理体系
          resourceControl: 核心许可、考试资格、导师署名和成果归属。
          legitimacySource: 管理者声称只有认证人员才能避免旧灾难重演。
          beneficiaries:
            - 资深导师
            - 持证成员
            - 依赖证书收费的考试官
          victims:
            - 初级学徒
            - 无证民间术士
            - 需要基础服务的普通人
          publicNarrative: 资格体系保护普通人免受危险尝试伤害。
          internalCracks:
            - 年轻讲师知道许可制度正在压制修复效率
            - 偏远分部缺资源，被迫默许灰色维修
          firstCollisionScene: 主角越权修复民生设施后，被要求提交许可和担保。
          relationshipHooks:
            - 核心伙伴来自体系内部，担心主角让自己背上违规风险
            - 受益者把主角当救命人，却害怕公开作证
      - label: 地方权力
        answer: 地方掌权者压下公共故障，因为公开异常会引发生计、税收和治安连锁反应。
        flavor: 世界压力更现实，主角每次修复都会碰到利益代价。
        tradeoffs:
          - 掌权者不只是反派，需要给出维稳逻辑。
          - 轻松感要靠小队互动调和。
        downstreamImpact: 第一舞台会更有真实利益结构，文明级威胁从民生异常露出。
        recommendedFor:
          - 固定据点
          - 真实世界压力
        interestingChoice:
          appeal: 把文明危机压进粮价、税收和治安，世界压力会更贴近日常。
          cost: 掌权者不能只写成坏人，需要给出维稳逻辑和短期合理性。
          relationshipImpact: 伙伴可能夹在家族责任、地方利益和对主角的信任之间。
          worldImpact: 普通人的生活成本会成为长线危机最早的可见阴影。
          futureHook: 下一轮最该确认主角第一次公开异常后，谁会立刻受损。
          confirmationBoundary: 候选势力结构，确认后才写入 World Bible、specification 或 conflict plan。
        powerStructure:
          name: 地方许可网
          resourceControl: 土地税、粮仓、维修材料配给和治安执法权。
          legitimacySource: 掌权者声称压下异常是为了避免恐慌、物价暴涨和地方骚乱。
          beneficiaries:
            - 地方掌权者
            - 粮商
            - 依赖治安预算的官吏
          victims:
            - 农户
            - 维修师
            - 被迫继续使用故障设施的普通家庭
          publicNarrative: 稳定比真相更重要，异常公开会伤害所有人。
          internalCracks:
            - 内部旁支想公开问题换取改革筹码
            - 治安底层知道事故数量被篡改
          firstCollisionScene: 主角修好公共设施后发现事故记录被改写，地方官要求签署保密文书。
          relationshipHooks:
            - 伙伴若是内部旁支，会同时打开资源门和制造信任障碍
            - 受害者希望主角公开真相，却承担不起生活成本上涨
      - label: 禁忌守护者
        answer: 教会或守夜组织把异常日志称为禁忌污染，他们可能既在遮蔽真相，也在防止旧灾难重演。
        flavor: 道德灰度更高，文明威胁更有历史重量。
        tradeoffs:
          - 悬疑感增强，但信息揭示要更克制。
          - 主角不能简单把禁忌全拆掉。
        downstreamImpact: 长线危机的揭示会更像层层拆开保护壳，价值转变会带来风险。
        recommendedFor:
          - 文明级威胁
          - 想写灰度势力
        interestingChoice:
          appeal: 守护者不是纯反派，禁忌背后可能真的有旧灾难经验。
          cost: 悬疑和历史重量会增强，需要控制信息揭示，避免开局变沉。
          relationshipImpact: 伙伴可能相信禁令，也可能因为亲历事故而动摇。
          worldImpact: 禁忌制度能把长线危机和远古遗留问题连起来。
          futureHook: 下一轮最该确认第一条禁忌到底保护了谁，又牺牲了谁。
          confirmationBoundary: 候选势力结构，确认后才写入 World Bible、specification 或 conflict plan。
        powerStructure:
          name: 禁忌守夜会
          resourceControl: 禁书目录、遗迹进入许可、异常日志封存权和净化仪式解释权。
          legitimacySource: 守夜会声称自己继承了第二次寂静后的防灾协议。
          beneficiaries:
            - 守夜会高层
            - 依赖禁忌解释权的教会分支
            - 不愿公开旧灾难责任的遗迹管理者
          victims:
            - 研究异常的民间术士
            - 被误判为污染者的病患
            - 需要真相自救的边境社区
          publicNarrative: 禁忌不是遮丑，而是阻止普通人被旧文明污染吞没。
          internalCracks:
            - 年轻守夜人怀疑封存日志正在延误救援
            - 老守夜人知道部分禁令来自政治妥协
          firstCollisionScene: 主角定位异常源，却被守夜组织要求交出全部记录。
          relationshipHooks:
            - 伙伴可能曾被守夜会救过，因此不愿立刻相信主角
            - 被压制的术士网络愿意提供线索，但会要求主角共享禁忌知识
  - id: core.tone
    stage: specify
    topic: tone
    question: 轻松感主要来自哪里？
    whyItMatters: 轻松来源会决定叙事口感，避免文明级威胁过早压垮阅读体验。
    type: multi-choice
    required: false
    exampleAnswers:
      - 角色吐槽和小队互损，但关键选择仍有后果。
      - 小事故的喜剧感，问题越处理越发现底层真相不对。
      - 冒险单元像旅行见闻，危险存在但不走压抑黑暗风。
  - id: core.relationship-line
    stage: specify
    topic: relationship
    question: 慢热感情线在早期承担什么功能？
    whyItMatters: 感情线如果只是奖励，会被主线挤掉；功能清楚才能慢热而不空转。
    type: textarea
    required: false
    exampleAnswers:
      - 关系对象帮助主角理解异界伦理，主角帮助对方看见制度漏洞。
      - 两人先是任务搭档，信任来自一次次小问题处理，不急着表白。
      - 感情线承担文明差异冲突，让“改变世界”先从理解一个人开始。
  - id: core.scope
    stage: specify
    topic: scope
    question: 第一阶段最不想让 AI 直接替你定稿的部分是什么？
    whyItMatters: 这会被标记为需要澄清，防止 AI 把建议写成正典。
    type: textarea
    required: true
    exampleAnswers:
      - 主角身份、感情对象和文明威胁真相都先不要定死。
      - 可以建议法术规则，但不要直接设定完整等级体系。
      - 可以给冒险单元方向，但不要替我决定结局和反派身份。
