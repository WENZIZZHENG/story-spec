id: magic-system
name: 编程施法
description: 处理魔法规则硬度、失败代价、资源、禁忌和学习路径。
keywords:
  - 编程
  - 施法
  - 法术
  - 魔法
  - 代码
  - 调试
questions:
  - id: magic.rule-hardness
    stage: specify
    topic: magic-system
    question: 编程施法更偏硬规则，还是轻量隐喻？
    whyItMatters: 规则硬度决定读者会期待严谨解谜，还是期待轻松奇思妙想。
    type: single-choice
    required: true
    options:
      - value: hard
        label: 硬规则
        description: 法术有语法、运行时、错误类型和资源消耗。
      - value: metaphor
        label: 轻量隐喻
        description: 编程是主角理解魔法的方式，不展开复杂技术细节。
    exampleAnswers:
      - 硬规则，读者能看懂 bug、补丁和法术失败原因。
      - 轻量隐喻，重点是主角用工程思维解决异界问题。
      - 中间路线，关键战斗讲规则，日常冒险保持轻巧。
  - id: magic.failure-cost
    stage: specify
    topic: magic-system
    question: 法术“运行失败”的代价是什么？
    whyItMatters: 失败代价能避免主角能力无成本，也能制造轻松但有后果的冲突。
    type: textarea
    required: false
    exampleAnswers:
      - 小失败会产生搞笑副作用，大失败会污染局部魔力环境。
      - 失败会消耗施法材料和精神专注，不能无限试错。
      - 错误会被旧文明系统记录，过多异常日志会引来追踪者。
  - id: magic.learning-path
    stage: specify
    topic: magic-system
    question: 主角如何学习和改良法术？
    whyItMatters: 学习路径决定建设流是工具还是主线，也决定同伴能否参与。
    type: textarea
    required: false
    exampleAnswers:
      - 主角先整理咒文库，像维护开源项目一样写注释和测试用例。
      - 主角靠现场调试，每次冒险后把经验沉淀成小工具。
      - 主角需要本地法师提供语料，自己只负责抽象和验证规则。
