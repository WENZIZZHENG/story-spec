id: magic-system
name: 编程施法
description: 处理魔法规则硬度、失败代价、资源、禁忌和学习路径。
keywords:
  - 编程
  - 施法
  - 法术
  - 魔法
  - 代码
  - 调试
questions:
  - id: magic.rule-hardness
    stage: specify
    topic: magic-system
    question: 编程施法更偏硬规则，还是轻量隐喻？
    whyItMatters: 规则硬度决定读者会期待严谨解谜，还是期待轻松奇思妙想。
    type: single-choice
    required: true
    choiceImpact: high
    options:
      - value: hard
        label: 硬规则
        description: 法术有语法、运行时、错误类型和资源消耗。
      - value: metaphor
        label: 轻量隐喻
        description: 编程是主角理解魔法的方式，不展开复杂技术细节。
    exampleAnswers:
      - 硬规则，读者能看懂 bug、补丁和法术失败原因。
      - 轻量隐喻，重点是主角用工程思维解决异界问题。
      - 中间路线，关键战斗讲规则，日常冒险保持轻巧。
    exampleBranches:
      - label: 轻量隐喻
        answer: 编程施法偏轻量隐喻，主角把魔法当成可调试问题，但不展开完整代码体系。
        flavor: 轻松、顺滑，重点是工程思维带来的奇思妙想。
        tradeoffs:
          - 技术辨识度会弱一些，需要靠角色行动和小事故保持新鲜。
          - 不适合频繁用术语解释胜负。
        downstreamImpact: 阅读承诺更接近轻松冒险；能力边界要靠失败代价和场景限制来呈现。
        interestingChoice:
          appeal: 轻松顺滑，读者能先享受主角用工程思维拆解事故的奇思妙想。
          cost: 技术辨识度会弱一些，需要靠角色行动和小事故保持新鲜。
          relationshipImpact: 伙伴更容易参与判断和纠偏，不会被大量术语挤出场景。
          worldImpact: 能力边界要靠失败代价、材料限制和场景规则来呈现。
          futureHook: 下一轮最该确认第一次失败代价是什么，以及谁会看见这次失败。
          confirmationBoundary: 这是候选方向；确认后才写入 specification 的能力边界和 Scene Card。
        recommendedFor:
          - 轻松冒险优先
          - 不想写成硬科幻式法术说明
      - label: 中度规则
        answer: 关键战斗讲清语法、错误和资源限制，日常冒险只保留“调试感”。
        flavor: 有规则爽点，但不会让每章都变成技术说明。
        tradeoffs:
          - 需要维护少量核心规则，避免前后矛盾。
          - 可以兼顾爽点和节奏，但作者要决定哪些规则永远不细写。
        downstreamImpact: 能力边界更清楚，成长路线可以围绕“发现规则-复用规则-付出代价”推进。
        interestingChoice:
          appeal: 既有规则爽点，也能保留轻松冒险的速度。
          cost: 作者需要维护少量核心规则，避免后续破局前后矛盾。
          relationshipImpact: 伙伴可以负责本地魔法经验，主角负责抽象调试，形成互补。
          worldImpact: 世界会出现可复用规则、资源限制和少量禁忌边界。
          futureHook: 下一轮应决定第一卷只公开哪三条规则，以及哪条规则会反噬主角。
          confirmationBoundary: 这是候选方向；确认后才写入 specification、creative-plan 和能力追踪。
        recommendedFor:
          - 想要规则感但仍重视故事节奏
          - 第一卷只展示有限规则
      - label: 硬规则
        answer: 法术有语法、运行时、错误类型、资源消耗和可复现测试，读者能推理胜负。
        flavor: 解谜感和推演感更强，胜利来自清晰规则内的聪明解法。
        tradeoffs:
          - 解释负担明显增加，容易压过轻松冒险。
          - 每次破局都需要经得起回看。
        downstreamImpact: 阅读承诺转向规则推演；冲突设计要提前规划规则、漏洞和代价。
        interestingChoice:
          appeal: 推理感更强，读者能从规则中预判风险并享受聪明解法。
          cost: 解释负担明显增加，轻松冒险节奏更容易被规则说明拖慢。
          relationshipImpact: 伙伴需要拥有不可替代的本地规则知识，否则容易变成旁观者。
          worldImpact: 世界必须承认法术语法、运行时、资源消耗和测试边界。
          futureHook: 下一轮应先定义最小规则表，以及第一卷哪次破局会暴露漏洞代价。
          confirmationBoundary: 这是候选方向；确认后才写入能力规则、冲突设计和计划门禁。
        recommendedFor:
          - 喜欢硬规则魔法
          - 愿意维护法术规则表
  - id: magic.failure-cost
    stage: specify
    topic: magic-system
    question: 法术“运行失败”的代价是什么？
    whyItMatters: 失败代价能避免主角能力无成本，也能制造轻松但有后果的冲突。
    type: textarea
    required: false
    exampleAnswers:
      - 小失败会产生搞笑副作用，大失败会污染局部魔力环境。
      - 失败会消耗施法材料和精神专注，不能无限试错。
      - 错误会被旧文明系统记录，过多异常日志会引来追踪者。
  - id: magic.learning-path
    stage: specify
    topic: magic-system
    question: 主角如何学习和改良法术？
    whyItMatters: 学习路径决定建设流是工具还是主线，也决定同伴能否参与。
    type: textarea
    required: false
    exampleAnswers:
      - 主角先整理咒文库，像维护开源项目一样写注释和测试用例。
      - 主角靠现场调试，每次冒险后把经验沉淀成小工具。
      - 主角需要本地法师提供语料，自己只负责抽象和验证规则。
