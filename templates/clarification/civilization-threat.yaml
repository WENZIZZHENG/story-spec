id: civilization-threat
name: 文明级威胁
description: 处理局部异常、长线威胁形态、揭示节奏和终局代价。
keywords:
  - 文明级
  - 威胁
  - 危机
  - 灾难
  - 旧文明
  - 终局
questions:
  - id: threat.first-symptom
    stage: specify
    topic: threat
    question: 文明级威胁最早以什么“小异常”出现？
    whyItMatters: 小异常能让大威胁慢慢露出，不破坏轻松冒险的开局。
    type: textarea
    required: true
    exampleAnswers:
      - 某些法术偶尔返回不该存在的旧日志，像系统在梦游。
      - 边境小城的作物和魔法工具出现同步故障，但大家只当成季节问题。
      - 古代遗迹里的防护脚本开始自动更新，说明沉睡系统正在苏醒。
    exampleBranches:
      - label: 旧日志梦游
        answer: 最早的小异常是低阶法术偶尔返回旧文明日志，内容像在呼叫已经不存在的管理员。
        flavor: 神秘但不压抑，像轻松冒险里混入一行不该出现的错误信息。
        tradeoffs:
          - 需要控制术语，不要过早解释旧文明系统。
          - 适合让晏无第一时间产生“这像日志”的误读。
        downstreamImpact: 长线威胁的阅读承诺偏谜团揭示，前三章可以用一次小故障留下钩子。
        recommendedFor:
          - 编程施法
          - 第三次寂静慢揭示
      - label: 民生日常故障
        answer: 边境小城的作物、照明和净水法器在同一晚轻微失灵，贵族只当成季节性损耗。
        flavor: 世界压力更贴近日常，危机从普通人的生活成本里冒出来。
        tradeoffs:
          - 不如遗迹异常显眼，需要用人物处境制造张力。
          - 更适合轻松冒险里带真实后果。
        downstreamImpact: 第一舞台会自然连到利益结构，势力冲突可由“是否公开异常”引发。
        recommendedFor:
          - 边境小城
          - 真实世界压力
      - label: 防护脚本自启
        answer: 古代遗迹的防护脚本开始自我更新，像某个沉睡系统发现第三次寂静正在接近。
        flavor: 冒险感和史诗感更早出现，旧文明存在感强。
        tradeoffs:
          - 容易提前抬高危机，需要限定第一卷只看见局部机制。
          - 需要给角色短期目标，避免只追设定。
        downstreamImpact: 文明威胁会更早牵引主线，成长路线需要阶段性破解遗迹规则。
        recommendedFor:
          - 遗迹冒险
          - 更强长线悬疑
  - id: threat.shape
    stage: specify
    topic: threat
    question: 你更想要哪类文明级威胁？
    whyItMatters: 威胁形态决定终局是战斗、修复、迁移还是价值选择。
    type: single-choice
    required: false
    exampleAnswers:
      - 旧文明运行时重启，会把现文明当成异常进程清理。
      - 魔法资源的底层协议即将枯竭，所有势力都误以为是战争导致。
      - 人们思想中的禁忌其实是防火墙，思想改造可能解除保护也可能释放灾难。
  - id: threat.reveal-pace
    stage: specify
    topic: threat
    question: 威胁揭示节奏要多慢？
    whyItMatters: 揭示节奏会影响每卷悬念密度，也保护轻松冒险不被大设定吞掉。
    type: textarea
    required: false
    exampleAnswers:
      - 第一卷只让读者看到三次异常，不解释真相。
      - 每个冒险单元解决小问题，同时留下一个底层系统线索。
      - 角色先误判成地方阴谋，第二卷才意识到这是文明尺度问题。
    exampleBranches:
      - label: 三次异常
        answer: 第一卷只出现三次异常，每次都能解释成地方事故，卷末才发现它们共享同一底层信号。
        flavor: 克制、慢热，读者能享受冒险本身。
        tradeoffs:
          - 悬疑推进更慢。
          - 每次异常都要有当下回报，不能只当伏笔。
        downstreamImpact: 阅读承诺更稳，creative-plan 需要标出三次异常的位置和阶段回报。
        recommendedFor:
          - 轻松冒险
          - 慢热长线威胁
      - label: 单元线索
        answer: 每个冒险单元解决一个小问题，同时留下一条旧文明系统线索。
        flavor: 节奏更紧，像一路收集世界运行异常。
        tradeoffs:
          - 线索密度更高，容易让大威胁抢戏。
          - 需要区分小问题回报和长线谜团回报。
        downstreamImpact: 计划阶段要把每个单元的“局部胜利”和“长线线索”分开写。
        recommendedFor:
          - 单元冒险
          - 文明谜团
      - label: 地方阴谋误判
        answer: 角色先以为异常来自地方贵族或学院阴谋，第二卷才发现他们也只是被旧规则困住。
        flavor: 灰度更强，前期冲突和后期世界观能互相反转。
        tradeoffs:
          - 需要避免前期反派突然洗白。
          - 伏笔要足够公平。
        downstreamImpact: 势力冲突会更复杂，第三次寂静不是单个敌人而是文明系统压力。
        recommendedFor:
          - 灰度势力
          - 想写文明级压力
